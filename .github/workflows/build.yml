name: Build release image

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare release directory
        run: mkdir -p release

      - name: Build OCI image archive
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          tags: gozargah/marzban-node:${{ github.ref_name }}
          outputs: type=oci,dest=release/marzban-node-${{ github.ref_name }}.oci.tar

      - name: Compress image archive
        run: gzip "release/marzban-node-${{ github.ref_name }}.oci.tar"

      - name: Upload image to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/marzban-node-${{ github.ref_name }}.oci.tar.gz
          generate_release_notes: true
